    <header class="shadow-sm mb-[60px]">
        <div class="navbar bg-base-100 w-11/12 mx-auto py-5 md:flex md:flex-row gap-5 flex-col ">

            <div class="flex-1 flex gap-2 items-center justify-start">
                <img class="w-[36px] h-[36px]" src="./assets/github-logo.png" alt="GitHub Logo">
                <a class="font-semibold text-2xl">GitHub Issues Tracker</a>
            </div>

            <div class="flex gap-4">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>

                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1110px] mx-auto">

        <section class="mx-auto w-11/12 mb-5">
            <div class="mx-auto shadow-md p-6 space-x-2">

                <button id="open-btn" class="btn md:px-8 px-6 py-3">Open</button>
                <button id="close-btn" class="btn md:px-8 px-6 py-3">Close</button>
            </div>
        </section>

        <section class="mx-auto w-11/12 mb-5">
            <div class="mx-auto shadow-md p-6 space-x-2 flex md:flex-row gap-4 flex-col justify-between">
                <div class="flex items-center gap-2">
                    <div class="bg-[#ECE4FF] rounded-full p-2">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h4 class="font-bold text-xl"> <span id="total-issues"></span> Issues</h4>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="space-x-4 flex items-center justify-center">
                    <div class="flex items-center justify-center">
                        <span class="w-[12px] h-[12px] bg-green-600 rounded-full flex items-center "> </span>
                        <p class="font-semibold mx-1 text-center">Open</p>
                    </div>

                    <div class="flex items-center justify-center ">
                        <span class="w-[12px] h-[12px] bg-purple-600 rounded-full flex items-center "> </span>
                        <p class="font-semibold mx-1 text-center">Close</p>
                    </div>

                    <!-- <span>Close</span> -->
                </div>
            </div>
        </section>
